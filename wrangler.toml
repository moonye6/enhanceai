# Cloudflare Pages Configuration
# For use with wrangler CLI or Cloudflare Dashboard

name = "enhanceai"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".vercel/output/static"

# KV Namespaces
# Replace b3fb231881954216aeaa66905f7cf820 and 5ed6b334a7fd4da09883db6a120b3dd0 with real IDs from Cloudflare Dashboard
# Dashboard → Workers & Pages → KV → Create namespace → copy namespace ID
[[kv_namespaces]]
binding = "ENHANCEAI_KV"
id = "b3fb231881954216aeaa66905f7cf820"
preview_id = "5ed6b334a7fd4da09883db6a120b3dd0"

# Environment variables (set these in Cloudflare Dashboard)
# [vars]
# FAL_AI_API_KEY = ""
