# Cloudflare Pages Configuration
# For use with wrangler CLI or Cloudflare Dashboard

name = "enhanceai"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# Pages configuration
pages_build_output_dir = ".vercel/output/static"

# KV Namespaces
# Replace b3fb231881954216aeaa66905f7cf820 and 5ed6b334a7fd4da09883db6a120b3dd0 with real IDs from Cloudflare Dashboard
# Dashboard → Workers & Pages → KV → Create namespace → copy namespace ID
[[kv_namespaces]]
binding = "ENHANCEAI_KV"
id = "b3fb231881954216aeaa66905f7cf820"
preview_id = "5ed6b334a7fd4da09883db6a120b3dd0"

# R2 Bucket — stores enhanced HD images (30-day retention via bucket lifecycle rule)
# Setup checklist (Cloudflare Dashboard):
# 1. R2 → bucket "forenhance" already created
# 2. bucket → Settings → Object lifecycle rules → "Delete after 30 days"
# 3. bucket → Settings → Public access → R2.dev subdomain → Allow Access (already done)
# 4. binding + R2_PUBLIC_URL are managed below — Pages dashboard UI is locked
#    because wrangler.toml is the source of truth (this is correct, not a bug)
[[r2_buckets]]
binding = "ENHANCEAI_R2"
bucket_name = "forenhance"
preview_bucket_name = "forenhance"

# Environment variables
# Public, non-secret values go here (kept in git for reproducibility).
# Secrets like FAL_AI_API_KEY must NOT be here — set them with:
#   npx wrangler pages secret put FAL_AI_API_KEY --project-name enhanceai
[vars]
R2_PUBLIC_URL = "https://pub-589c968a2e7d4ab6830b55de2e956e62.r2.dev"
